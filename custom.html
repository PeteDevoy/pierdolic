<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#000000">
    <title>Pierdolić</title>
    <style>
      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
      }

      body {
        display: flex;
        overflow: hidden;
        background: #000;
      }

      :root {
        --sheet-width: min(560px, calc(100vw - 28px));
        --tray-height: 64px;
        --sheet-tray-gap: 10px;
      }

      .controls {
        position: fixed;
        top: 16px;
        right: 16px;
        z-index: 1;
        display: flex;
        align-items: center;
        gap: 12px;
      }

      .nav-button {
        width: 56px;
        height: 56px;
        padding: 0;
        border: 2px solid #fff;
        border-radius: 999px;
        background: #000;
        color: #fff;
        font: inherit;
        font-size: 34px;
        line-height: 1;
        cursor: pointer;
      }

      .nav-button[disabled] {
        opacity: 0.35;
        cursor: default;
      }

      svg {
        width: 100%;
        height: 100%;
        display: block;
        background: #000;
      }

      text {
        fill: #fff;
        font-family: sans-serif;
      }

      .orbit-label-group {
        cursor: pointer;
      }

      .label-stem {
        stroke: #fff;
        stroke-linecap: round;
      }

      .label-badge-fill {
        fill: #000;
      }

      .label-badge-solid {
        fill: none;
        stroke: #fff;
        stroke-width: 4;
        stroke-linecap: round;
        stroke-linejoin: round;
        vector-effect: non-scaling-stroke;
      }

      .label-badge-dashed {
        fill: none;
        stroke: #fff;
        stroke-width: 4;
        stroke-linecap: round;
        stroke-dasharray: 10 8;
        vector-effect: non-scaling-stroke;
      }

      .word-bbox-edge {
        fill: none;
        stroke: #fff;
        stroke-width: 4;
        vector-effect: non-scaling-stroke;
      }

      .word-bbox-gap {
        fill: none;
        stroke: #000;
        stroke-width: 8;
        stroke-linecap: square;
        vector-effect: non-scaling-stroke;
      }

      .debug-shape {
        fill: none;
        pointer-events: none;
        vector-effect: non-scaling-stroke;
      }

      .debug-point {
        pointer-events: none;
        vector-effect: non-scaling-stroke;
      }

      .gloss-sheet {
        position: fixed;
        left: 50%;
        bottom: calc(var(--tray-height) + env(safe-area-inset-bottom) + var(--sheet-tray-gap));
        z-index: 2;
        width: var(--sheet-width);
        max-height: min(34vh, 280px);
        padding: 0 18px 18px;
        border: 2px solid rgba(255, 255, 255, 0.86);
        border-radius: 24px;
        background: rgba(0, 0, 0, 0.88);
        color: #fff;
        box-sizing: border-box;
        display: flex;
        flex-direction: column;
        transform: translateX(-50%);
        transition: transform 180ms ease;
        box-shadow: 0 18px 60px rgba(0, 0, 0, 0.5);
        overflow: hidden;
        will-change: transform;
        -webkit-backdrop-filter: blur(12px);
        backdrop-filter: blur(12px);
      }

      .gloss-sheet.is-peeking {
        transform: translateX(-50%) translateY(calc(100% - 38px));
      }

      .gloss-sheet.is-dragging {
        transition: none;
      }

      .gloss-sheet-handle {
        display: block;
        width: 44px;
        height: 20px;
        margin: 0 auto 14px;
        padding: 0;
        border: 0;
        background: transparent;
        cursor: pointer;
        flex: 0 0 auto;
        position: relative;
        z-index: 4;
        touch-action: none;
        user-select: none;
      }

      .gloss-sheet-handle::before {
        content: "";
        display: block;
        width: 44px;
        height: 4px;
        margin: 8px 0;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.66);
      }

      .gloss-sheet.is-dragging .gloss-sheet-handle {
        cursor: grabbing;
      }

      #gloss-sheet-body {
        min-height: 0;
        overflow-y: auto;
        padding-right: 2px;
      }

      .gloss-list {
        display: grid;
        gap: 8px;
        padding: 0;
        margin: 0;
        list-style: none;
        font: 400 clamp(15px, 4vw, 18px) / 1.35 sans-serif;
      }

      .gloss-list li {
        padding: 9px 11px;
        border: 1px solid rgba(255, 255, 255, 0.2);
        border-radius: 10px;
        background: rgba(255, 255, 255, 0.07);
      }

      .gloss-empty {
        margin: 0;
        color: rgba(255, 255, 255, 0.68);
        font: 400 16px / 1.4 sans-serif;
      }

      .sheet-section-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        margin: 0 0 12px;
      }

      .sheet-section-title {
        margin: 0;
        font: 700 18px / 1.2 sans-serif;
      }

      .formation-stack {
        display: grid;
        gap: 10px;
        font: 400 clamp(15px, 4vw, 18px) / 1.35 sans-serif;
      }

      .formation-change {
        padding: 11px 12px;
        border: 1px solid rgba(255, 255, 255, 0.2);
        border-radius: 10px;
        background: rgba(255, 255, 255, 0.07);
      }

      .formation-token {
        display: block;
        margin: 0 0 6px;
        font: 700 clamp(22px, 6vw, 30px) / 1.05 sans-serif;
      }

      .formation-explanation {
        margin: 0;
      }

      .formation-extra {
        margin: 8px 0 0;
        color: rgba(255, 255, 255, 0.78);
      }

      .formation-meta {
        margin: 10px 0 0;
        padding-top: 8px;
        border-top: 1px solid rgba(255, 255, 255, 0.14);
        color: rgba(255, 255, 255, 0.62);
        font-size: 13px;
        line-height: 1.35;
      }

      .formation-tags {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
        margin: 8px 0 0;
      }

      .formation-tag {
        padding: 3px 8px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.12);
      }

      .example-stack {
        display: grid;
        gap: 10px;
        font: 400 clamp(15px, 4vw, 18px) / 1.35 sans-serif;
      }

      .example-card {
        padding: 11px 12px;
        border: 1px solid rgba(255, 255, 255, 0.2);
        border-radius: 10px;
        background: rgba(255, 255, 255, 0.07);
      }

      .example-card strong {
        display: block;
        margin: 0 0 8px;
      }

      .example-translation-toggle {
        display: flex;
        flex: 0 0 auto;
        width: 132px;
        margin: 0;
        padding: 2px;
        border: 1px solid rgba(255, 255, 255, 0.78);
        border-radius: 999px;
        box-sizing: border-box;
        background: rgba(255, 255, 255, 0.06);
      }

      .example-translation-option {
        flex: 1 1 0;
        min-height: 24px;
        padding: 0 4px;
        border: 0;
        border-radius: 999px;
        background: transparent;
        color: #fff;
        font-family: sans-serif;
        font-size: 12px;
        font-weight: 700;
        cursor: pointer;
      }

      .example-translation-option.is-active {
        background: #fff;
        color: #000;
      }

      .example-translation-text {
        margin: 0;
        line-height: 1.45;
      }

      .bottom-tray {
        position: fixed;
        left: 0;
        right: 0;
        bottom: 0;
        z-index: 3;
        min-height: calc(var(--tray-height) + env(safe-area-inset-bottom));
        padding: 8px 0 calc(8px + env(safe-area-inset-bottom));
        box-sizing: border-box;
        background: rgba(0, 0, 0, 0.94);
        border-top: 1px solid rgba(255, 255, 255, 0.16);
      }

      .bottom-tray-inner {
        display: flex;
        align-items: center;
        justify-content: space-around;
        width: var(--sheet-width);
        height: 48px;
        margin: 0 auto;
      }

      .tray-icon {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 48px;
        height: 48px;
        padding: 0;
        border: 0;
        border-radius: 999px;
        background: transparent;
        color: #fff;
        font-size: 28px;
        line-height: 1;
        cursor: pointer;
      }

      .tray-icon.is-active {
        background: rgba(255, 255, 255, 0.12);
      }

      .tray-icon[disabled] {
        opacity: 0.45;
        cursor: default;
      }

      @media (max-width: 640px) {
        :root {
          --sheet-width: calc(100vw - 20px);
        }

        .controls {
          top: max(12px, env(safe-area-inset-top));
          right: 12px;
          gap: 10px;
        }

        .nav-button {
          width: 48px;
          height: 48px;
        }

        .nav-button {
          font-size: 28px;
        }

        .gloss-sheet {
          max-height: 38vh;
          padding: 0 14px 16px;
          border-radius: 20px;
        }
      }
    </style>
    <script>
      window.addEventListener("load", async function () {
        var rootVerbNode = {
          variant:
            document.getElementById("hello-stem").textContent.trim() +
            document.getElementById("hello-suffix").textContent.trim(),
          children: []
        };
        var focusedVerbNode = rootVerbNode;
        var orbitEntries = [];
        var midpointBias = 0.5;
        var debugEnabled = false;
        var activeSheetMode = "glosses";
        var exampleTranslationMode = "natural";
        var badgeCornerRadiusRatio = 0.22;
        var glossSheetExpanded = false;
        var glossSheetDrag = null;
        var glossSheetTransitionCleanup = null;
        var ignoreNextGlossSheetClick = false;
        var lexicalIndex = new Map();
        var prefixGuideIndex = {};
        var debugColors = [
          "#4ddcff",
          "#ffb347",
          "#8dff7a",
          "#ff8fab",
          "#b794f4",
          "#f6e05e",
          "#63b3ed",
          "#f687b3"
        ];
        var lastLayout = null;
        var resizeFrame = null;
        var sheetLayoutFrame = null;

        async function loadVerbData() {
          var response = await fetch("data/reduced-verb-data.json");
          var data;

          if (!response.ok) {
            throw new Error("Failed to load reduced verb data: " + response.status);
          }

          data = await response.json();

          return data;
        }

        async function loadLexicalData() {
          var response = await fetch("data/verb-data.json");
          var data;

          if (!response.ok) {
            throw new Error("Failed to load verb data: " + response.status);
          }

          data = await response.json();

          return data;
        }

        async function loadPrefixGuideData() {
          var response = await fetch("data/prefix-guide.json");
          var data;

          if (!response.ok) {
            throw new Error("Failed to load prefix guide data: " + response.status);
          }

          data = await response.json();

          return data;
        }

        function indexLexicalData(node) {
          if (!node || typeof node !== "object") {
            return;
          }

          if (typeof node.lemma === "string" && node.lemma) {
            lexicalIndex.set(node.lemma, node);
          }

          (Array.isArray(node.children) ? node.children : []).forEach(indexLexicalData);
        }

        function linkVerbTree(node, parentNode) {
          if (!node || typeof node !== "object") {
            return;
          }

          node.parentVerbNode = parentNode || null;

          (Array.isArray(node.children) ? node.children : []).forEach(function (childNode) {
            linkVerbTree(childNode, node);
          });
        }

        function createSvgElement(tagName, attributes) {
          var element = document.createElementNS("http://www.w3.org/2000/svg", tagName);

          Object.keys(attributes).forEach(function (name) {
            element.setAttribute(name, attributes[name]);
          });

          return element;
        }

        function rectFromBBox(bbox) {
          return {
            minX: bbox.x,
            maxX: bbox.x + bbox.width,
            minY: bbox.y,
            maxY: bbox.y + bbox.height
          };
        }

        function getPointOnRay(originX, originY, directionX, directionY, distance) {
          return {
            x: originX + directionX * distance,
            y: originY + directionY * distance
          };
        }

        function getRectExitDistanceFromCenter(directionX, directionY, rect) {
          return getRayExitDistanceFromRect(0, 0, directionX, directionY, rect);
        }

        function getBadgeShapeData(width, height, cornerRadius, orientation, styleVariant) {
          var halfWidth = width / 2;
          var halfHeight = height / 2;
          var radius = Math.min(cornerRadius, halfWidth, halfHeight);
          var left = -halfWidth;
          var right = halfWidth;
          var top = -halfHeight;
          var bottom = halfHeight;
          var isSuffixBadge = orientation === "suffix";

          if (styleVariant === "substitution") {
            return {
              left: left,
              right: right,
              top: top,
              bottom: bottom,
              width: width,
              height: height,
              radius: 0,
              fillPath:
                "M " +
                left +
                " " +
                top +
                " H " +
                right +
                " V " +
                bottom +
                " H " +
                left +
                " Z",
              solidPath: "",
              dashedPath:
                "M " +
                left +
                " " +
                top +
                " H " +
                right +
                " M " +
                left +
                " " +
                bottom +
                " H " +
                right,
              fitRect: {
                minX: left,
                maxX: right,
                minY: top,
                maxY: bottom
              },
              collisionRadius: Math.sqrt(width * width + height * height) / 2
            };
          }

          if (styleVariant === "substitution-terminal") {
            return {
              left: left,
              right: right,
              top: top,
              bottom: bottom,
              width: width,
              height: height,
              radius: radius,
              fillPath:
                "M " +
                left +
                " " +
                top +
                " H " +
                (right - radius) +
                " A " +
                radius +
                " " +
                radius +
                " 0 0 1 " +
                right +
                " " +
                (top + radius) +
                " V " +
                (bottom - radius) +
                " A " +
                radius +
                " " +
                radius +
                " 0 0 1 " +
                (right - radius) +
                " " +
                bottom +
                " H " +
                left +
                " Z",
              solidPath:
                "M " +
                (right - radius) +
                " " +
                top +
                " A " +
                radius +
                " " +
                radius +
                " 0 0 1 " +
                right +
                " " +
                (top + radius) +
                " V " +
                (bottom - radius) +
                " A " +
                radius +
                " " +
                radius +
                " 0 0 1 " +
                (right - radius) +
                " " +
                bottom,
              dashedPath:
                "M " +
                left +
                " " +
                top +
                " H " +
                (right - radius) +
                " M " +
                left +
                " " +
                bottom +
                " H " +
                (right - radius),
              fitRect: {
                minX: left,
                maxX: right,
                minY: top,
                maxY: bottom
              },
              collisionRadius: Math.sqrt(width * width + height * height) / 2
            };
          }

          return {
            left: left,
            right: right,
            top: top,
            bottom: bottom,
            width: width,
            height: height,
            radius: radius,
            fillPath: isSuffixBadge
              ? "M " +
                left +
                " " +
                top +
                " H " +
                (right - radius) +
                " A " +
                radius +
                " " +
                radius +
                " 0 0 1 " +
                right +
                " " +
                (top + radius) +
                " V " +
                (bottom - radius) +
                " A " +
                radius +
                " " +
                radius +
                " 0 0 1 " +
                (right - radius) +
                " " +
                bottom +
                " H " +
                left +
                " Z"
              : "M " +
                (left + radius) +
                " " +
                top +
                " H " +
                right +
                " V " +
                bottom +
                " H " +
                (left + radius) +
                " A " +
                radius +
                " " +
                radius +
                " 0 0 1 " +
                left +
                " " +
                (bottom - radius) +
                " V " +
                (top + radius) +
                " A " +
                radius +
                " " +
                radius +
                " 0 0 1 " +
                (left + radius) +
                " " +
                top +
                " Z",
            solidPath: isSuffixBadge
              ? "M " +
                left +
                " " +
                top +
                " H " +
                (right - radius) +
                " A " +
                radius +
                " " +
                radius +
                " 0 0 1 " +
                right +
                " " +
                (top + radius) +
                " V " +
                (bottom - radius) +
                " A " +
                radius +
                " " +
                radius +
                " 0 0 1 " +
                (right - radius) +
                " " +
                bottom +
                " H " +
                left
              : "M " +
                right +
                " " +
                top +
                " H " +
                (left + radius) +
                " A " +
                radius +
                " " +
                radius +
                " 0 0 0 " +
                left +
                " " +
                (top + radius) +
                " V " +
                (bottom - radius) +
                " A " +
                radius +
                " " +
                radius +
                " 0 0 0 " +
                (left + radius) +
                " " +
                bottom +
                " H " +
                right,
            dashedPath: isSuffixBadge
              ? "M " + left + " " + top + " V " + bottom
              : "M " + right + " " + top + " V " + bottom,
            fitRect: {
              minX: left,
              maxX: right,
              minY: top,
              maxY: bottom
            },
            collisionRadius: Math.sqrt(width * width + height * height) / 2
          };
        }

        function clamp(value, min, max) {
          return Math.min(max, Math.max(min, value));
        }

        // Find how far a ray can travel before it exits a rectangle.
        function getRayExitDistanceFromRect(originX, originY, directionX, directionY, rect) {
          var candidates = [];

          if (directionX > 0) {
            candidates.push((rect.maxX - originX) / directionX);
          } else if (directionX < 0) {
            candidates.push((rect.minX - originX) / directionX);
          }

          if (directionY > 0) {
            candidates.push((rect.maxY - originY) / directionY);
          } else if (directionY < 0) {
            candidates.push((rect.minY - originY) / directionY);
          }

          return Math.min.apply(
            null,
            candidates.filter(function (value) {
              return value >= 0;
            })
          );
        }

        function getRayExitDistanceFromEllipse(directionX, directionY, radiusX, radiusY) {
          return 1 / Math.sqrt(
            (directionX * directionX) / (radiusX * radiusX) +
              (directionY * directionY) / (radiusY * radiusY)
          );
        }

        function constrainLowerBound(bounds, coefficient, value) {
          if (coefficient > 0) {
            bounds.min = Math.max(bounds.min, value / coefficient);
          } else if (coefficient < 0) {
            bounds.max = Math.min(bounds.max, value / coefficient);
          } else if (value > 0) {
            bounds.invalid = true;
          }
        }

        function constrainUpperBound(bounds, coefficient, value) {
          if (coefficient > 0) {
            bounds.max = Math.min(bounds.max, value / coefficient);
          } else if (coefficient < 0) {
            bounds.min = Math.max(bounds.min, value / coefficient);
          } else if (value < 0) {
            bounds.invalid = true;
          }
        }

        function normalizePrefix(prefix) {
          return typeof prefix === "string" ? prefix.replace(/-$/, "") : "";
        }

        function normalizePrefixGuideKey(prefix) {
          var token = typeof prefix === "string" ? prefix.trim() : "";

          if (!token) {
            return "";
          }

          if (token === "s" || token === "s-" || token === "z" || token === "z-") {
            return "s-/z-";
          }

          return token.charAt(token.length - 1) === "-" ? token : token + "-";
        }

        function normalizeSuffix(suffix) {
          return typeof suffix === "string" ? suffix.replace(/^-/, "") : "";
        }

        function formatSuffixLabel(suffix) {
          if (typeof suffix !== "string" || !suffix) {
            return "";
          }

          return suffix.charAt(0) === "-" ? suffix : "-" + suffix;
        }

        function getNodeBaseWord(node) {
          var suffix;
          var reflexiveSuffix;

          if (!node || typeof node !== "object") {
            return "";
          }

          if (typeof node.stem === "string" && node.stem) {
            suffix = normalizeSuffix(node.suffix);

            return node.stem + suffix;
          }

          if (typeof node.variant === "string" && node.variant) {
            reflexiveSuffix = node.reflexiveTarget ? " " + node.reflexiveTarget : "";

            return reflexiveSuffix && node.variant.slice(-reflexiveSuffix.length) === reflexiveSuffix
              ? node.variant.slice(0, -reflexiveSuffix.length)
              : node.variant;
          }

          return "";
        }

        function getNodeVariant(node) {
          var baseWord = getNodeBaseWord(node);

          return baseWord + (node && node.reflexiveTarget ? " " + node.reflexiveTarget : "");
        }

        function getNodePrefix(node) {
          return normalizePrefix(node && node.prefix);
        }

        function areReflexivePairVariants(firstNode, secondNode) {
          return Boolean(
            firstNode &&
              secondNode &&
              getNodePrefix(firstNode) === getNodePrefix(secondNode) &&
              normalizeSuffix(firstNode && firstNode.suffix) ===
                normalizeSuffix(secondNode && secondNode.suffix) &&
              getNodeBaseWord(firstNode) === getNodeBaseWord(secondNode) &&
              (firstNode.reflexiveTarget || "") !== (secondNode.reflexiveTarget || "")
          );
        }

        function hasSuffixSubstitution(node) {
          return Boolean(
            node &&
              node.suffixSubstitution &&
              typeof node.suffixSubstitution.to === "string"
          );
        }

        function isLeafVerbNode(node) {
          return !Array.isArray(node && node.children) || node.children.length === 0;
        }

        function hasTrailingReflexiveToken(node) {
          return Boolean(node && node.reflexiveTarget);
        }

        function isSubstitutionBadge(entry) {
          return (
            entry &&
            (entry.badgeStyle === "substitution" ||
              entry.badgeStyle === "substitution-terminal")
          );
        }

        function getTransitionDetails(parentNode, childNode) {
          var parentPrefix = getNodePrefix(parentNode);
          var childPrefix = getNodePrefix(childNode);
          var labelParts = [];
          var suffixLabel = "";
          var hasPrefixChange = false;
          var hasSuffixChange = false;
          var hasReflexiveChange = false;
          var isSubstitution = hasSuffixSubstitution(childNode);
          var isTerminalSubstitution =
            isSubstitution &&
            isLeafVerbNode(childNode) &&
            !hasTrailingReflexiveToken(childNode);
          var label;

          if (childPrefix && childPrefix !== parentPrefix) {
            hasPrefixChange = true;
            labelParts.push(childPrefix);
          }

          if (isSubstitution) {
            suffixLabel = formatSuffixLabel(childNode.suffixSubstitution.to);
          } else if (parentNode && childNode && parentNode.suffix !== childNode.suffix) {
            suffixLabel = formatSuffixLabel(childNode && childNode.suffix);
          }

          if (suffixLabel) {
            hasSuffixChange = true;
            labelParts.push(suffixLabel);
          }

          if (
            childNode &&
            childNode.reflexiveTarget &&
            childNode.reflexiveTarget !== (parentNode && parentNode.reflexiveTarget)
          ) {
            hasReflexiveChange = true;
            labelParts.push(childNode.reflexiveTarget);
          }

          label = labelParts.join(" ").trim() || getNodeVariant(childNode);
          return {
            label: label,
            badgeOrientation:
              !hasPrefixChange && (hasSuffixChange || hasReflexiveChange) ? "suffix" : "prefix",

            minY: metrics.bbox.y - layout.centerWordPaddingY,
            maxY: metrics.bbox.y + metrics.bbox.height + layout.centerWordPaddingY

        function getFocusedWordParts() {
          var prefix = getNodePrefix(focusedVerbNode);
          var baseWord = getNodeBaseWord(focusedVerbNode);
          var suffixText = normalizeSuffix(focusedVerbNode && focusedVerbNode.suffix);
          var stemText = baseWord;

          if (suffixText && baseWord.slice(-suffixText.length) === suffixText) {
            stemText = baseWord.slice(0, -suffixText.length);
          }

          return {
            prefix: prefix,
            stemText: prefix && stemText.indexOf(prefix) === 0 ? stemText.slice(prefix.length) : stemText,
            suffixText: suffixText,
            reflexive: focusedVerbNode && focusedVerbNode.reflexiveTarget
              ? focusedVerbNode.reflexiveTarget
              : ""
          };
        }

        function renderHelloWorld(layout) {
          var svg = document.getElementById("scene");
          var prefixNode = document.getElementById("hello-prefix");
          var stemNode = document.getElementById("hello-stem");
          var suffixNode = document.getElementById("hello-suffix");
          var reflexiveNode = document.getElementById("hello-reflexive");
          var wordParts = getFocusedWordParts();
          var selectedPrefix = wordParts.prefix;
          var stemText = wordParts.stemText;
          var suffixText = wordParts.suffixText;
          var reflexiveWord = wordParts.reflexive;
          var centerX = layout.width / 2;
          var centerY = layout.height / 2;
          var joinGap = 0;
          var reflexiveGap = Math.max(10, layout.helloFontSize * 0.16);
          var prefixWidth;
          var stemWidth;
          var suffixWidth;
          var mutableWordWidth;
          var reflexiveWidth;
          var totalWidth;
          var phraseStartX;
          var prefixStartX;
          var stemStartX;
          var suffixStartX;
          var reflexiveStartX;

          prefixNode.textContent = selectedPrefix;
          stemNode.textContent = stemText;
          suffixNode.textContent = suffixText;
          reflexiveNode.textContent = reflexiveWord;
          prefixNode.style.fontSize = layout.helloFontSize + "px";
          stemNode.style.fontSize = layout.helloFontSize + "px";
          suffixNode.style.fontSize = layout.helloFontSize + "px";
          reflexiveNode.style.fontSize = layout.helloFontSize + "px";
          prefixNode.setAttribute("y", centerY);
          stemNode.setAttribute("y", centerY);
          suffixNode.setAttribute("y", centerY);
          reflexiveNode.setAttribute("y", centerY);
          prefixNode.setAttribute("visibility", "visible");

          prefixWidth = selectedPrefix ? prefixNode.getComputedTextLength() : 0;
          stemWidth = stemNode.getComputedTextLength();
          suffixWidth = suffixText ? suffixNode.getComputedTextLength() : 0;
          mutableWordWidth = prefixWidth + joinGap + stemWidth + suffixWidth;
          reflexiveWidth = reflexiveWord ? reflexiveNode.getComputedTextLength() : 0;
          totalWidth = mutableWordWidth + (reflexiveWord ? reflexiveGap + reflexiveWidth : 0);
          phraseStartX = centerX - totalWidth / 2;
          prefixStartX = phraseStartX;
          stemStartX = prefixStartX + prefixWidth + joinGap;
          suffixStartX = stemStartX + stemWidth;
          reflexiveStartX = prefixStartX + mutableWordWidth + reflexiveGap;

          prefixNode.setAttribute("x", prefixStartX);
          stemNode.setAttribute("x", stemStartX);
          suffixNode.setAttribute("x", suffixStartX);
          reflexiveNode.setAttribute("x", reflexiveStartX);
          prefixNode.setAttribute("visibility", selectedPrefix ? "visible" : "hidden");
          suffixNode.setAttribute("visibility", suffixText ? "visible" : "hidden");
          reflexiveNode.setAttribute("visibility", reflexiveWord ? "visible" : "hidden");

        function setFocusedVerbNode(node) {
          if (focusedVerbNode === node) {
            return;
          }

          focusedVerbNode = node;
          orbitEntries = getOrbitEntries(node);
          updateBackButton();
          renderDetailSheet();
          renderClockLabels();
        }

        function getVisualizationLayoutHeight(viewportHeight) {
          var sheet = document.getElementById("gloss-sheet");
          var sheetRect = sheet ? sheet.getBoundingClientRect() : null;
          var visualGap = 12;
          var availableHeight = sheetRect
            ? sheetRect.top - visualGap
            : viewportHeight;

          return clamp(availableHeight, 1, viewportHeight);
        }

        // Match the SVG coordinate system to the actual viewport while keeping
        // the graph inside the vertical space not occupied by the bottom sheet.
        function syncSceneToViewport() {
          var svg = document.getElementById("scene");
          var width = svg.clientWidth || window.innerWidth;
          var viewportHeight = window.innerHeight;
          var height = getVisualizationLayoutHeight(viewportHeight);
          var currentWordLength = Math.max(1, getCurrentWordText().length);
          var helloFontSize =
            Math.min(width * 0.095, height * 0.18) * Math.min(1, 12 / currentWordLength);
          var longestPrefixLength = orbitEntries.reduce(function (longest, entry) {
            return Math.max(longest, entry.label.length);
          }, 1);
          var densityScale = Math.max(0.24, 0.62 - orbitEntries.length * 0.018);
          var lengthScale = Math.max(0.26, 0.58 - longestPrefixLength * 0.04);
          var labelFontSizeMax = helloFontSize * Math.min(densityScale, lengthScale);
          var labelFontSizeMin = Math.max(12, helloFontSize * 0.13);
          var layout;

          svg.style.height = height + "px";
          svg.setAttribute("viewBox", "0 0 " + width + " " + height);

          layout = {
            width: width,
            height: height,
            viewportHeight: viewportHeight,
            helloFontSize: helloFontSize,
            labelFontSizeMax: labelFontSizeMax,
            labelFontSizeMin: labelFontSizeMin,
            badgeStrokeWidth: 4,
            stemWordGap: 1.5,
            badgePaddingFactor: 0.18,
            badgeMinPadding: 8,
            badgeCollisionGap: Math.max(6, helloFontSize * 0.04),
            centerWordPaddingX: Math.max(18, helloFontSize * 0.12),
            centerWordPaddingY: Math.max(10, helloFontSize * 0.09),
            centerWordSubstitutionPaddingX: Math.max(8, helloFontSize * 0.05),
            orbitPaddingX: helloFontSize * (0.35 + orbitEntries.length * 0.005),
            orbitPaddingY: helloFontSize * (0.42 + orbitEntries.length * 0.004)
          };

          renderHelloWorld(layout);

          return layout;
        }

        function getHelloWorldMetrics() {
          var wordElement = document.getElementById("hello-world");
          var suffixElement = document.getElementById("hello-suffix");

          var bbox = wordElement.getBBox();
          var suffixBBox = suffixElement.getBBox();

          return {
            wordElement: wordElement,
            svg: svg,
            bbox: bbox,
            suffixBBox: suffixBBox,
            viewBox: viewBox,
            centerX: bbox.x + bbox.width / 2,
            centerY: bbox.y + bbox.height / 2

        }

        function getRelativeRect(node) {
          return rectFromBBox(node.getBBox());
        }

        function getCenterSuffixRect(metrics, layout) {
          return {
            minX: metrics.suffixBBox.x - layout.centerWordSubstitutionPaddingX,
            maxX: metrics.suffixBBox.x + metrics.suffixBBox.width + layout.centerWordSubstitutionPaddingX,
            minY: metrics.bbox.y - layout.centerWordPaddingY,
            maxY: metrics.bbox.y + metrics.bbox.height + layout.centerWordPaddingY

        function renderWordBoundingBox(metrics, layout) {
          var bboxLayer = document.getElementById("word-bbox-layer");
          var wordRect = getCenterWordRect(metrics, layout);
          var suffixRect = getCenterSuffixRect(metrics, layout);
          var width = wordRect.maxX - wordRect.minX;
          var height = wordRect.maxY - wordRect.minY;
          var borderState = getCenterWordBorderState();
          var radius = Math.min(width, height) * badgeCornerRadiusRatio;
          var borderShape = getCenterWordBorderShapeData(
            width,
            height,
            radius,
            borderState
          );
          var centerX = (wordRect.minX + wordRect.maxX) / 2;

            d: borderShape.solidPath,

          });

          if (borderState.substitutionAttachment) {
            bboxLayer.appendChild(
              createSvgElement("path", {
                d:
                  "M " +
                  suffixRect.minX +
                  " " +
                  wordRect.minY +
                  " H " +
                  suffixRect.maxX +
                  " M " +
                  suffixRect.minX +
                  " " +
                  wordRect.maxY +
                  " H " +
                  suffixRect.maxX,
                class: "word-bbox-gap"

            );
            bboxLayer.appendChild(
              createSvgElement("path", {
                d:
                  "M " +
                  suffixRect.minX +
                  " " +
                  wordRect.minY +
                  " H " +
                  suffixRect.maxX +
                  " M " +
                  suffixRect.minX +
                  " " +
                  wordRect.maxY +

        // Keep the label inside the real page edges, but use an optical fit rect
        // instead of the raw bbox so glyph metrics do not over-constrain it.
        function getMaxAnchorDistanceInsidePage(metrics, layout, directionX, directionY, fitRect) {
          var bounds = {
            min: -Infinity,
            max: Infinity,
            invalid: false
          };

          constrainLowerBound(bounds, directionX, -metrics.centerX - fitRect.minX);
          constrainUpperBound(
            bounds,
            directionX,
            layout.width - metrics.centerX - fitRect.maxX
          );
          constrainLowerBound(bounds, directionY, -metrics.centerY - fitRect.minY);
          constrainUpperBound(
            bounds,
            directionY,
            layout.height - metrics.centerY - fitRect.maxY
          );

          if (bounds.invalid) {
            return null;
          }

          return bounds.max;
        }

        window.getDistanceFromHelloWorldToPageEdge = function (radians) {
          var layout = lastLayout || syncSceneToViewport();
          var metrics = getHelloWorldMetrics();
          var directionX = Math.cos(radians);
          var directionY = Math.sin(radians);
          var textRect = getCenterWordRect(metrics, layout);
          var pageRect = {
            minX: 0,
            maxX: layout.width,
            minY: 0,
            maxY: layout.height
          };
          var orbitRadiusX = (textRect.maxX - textRect.minX) / 2 + layout.orbitPaddingX;
          var orbitRadiusY = (textRect.maxY - textRect.minY) / 2 + layout.orbitPaddingY;
          var distanceToTextEdge = getRayExitDistanceFromRect(
            metrics.centerX,
            metrics.centerY,
            directionX,
            directionY,
            textRect
          );
          var distanceToOrbitEdge = getRayExitDistanceFromEllipse(
            directionX,
            directionY,
            orbitRadiusX,
            orbitRadiusY
          );
          var distanceToPageEdge = getRayExitDistanceFromRect(
            metrics.centerX,
            metrics.centerY,
            directionX,
            directionY,
            pageRect
          );

          return {
            radians: radians,
            metrics: metrics,
            directionX: directionX,
            directionY: directionY,
            orbitRadiusX: orbitRadiusX,
            orbitRadiusY: orbitRadiusY,
            distanceToTextEdge: distanceToTextEdge,
            distanceToOrbitEdge: distanceToOrbitEdge,
            distanceToPageEdge: distanceToPageEdge,
            textEdgePoint: getPointOnRay(
              metrics.centerX,
              metrics.centerY,
              directionX,
              directionY,
              distanceToTextEdge
            ),
            orbitEdgePoint: getPointOnRay(
              metrics.centerX,
              metrics.centerY,
              directionX,
              directionY,
              distanceToOrbitEdge
            ),
            pageEdgePoint: getPointOnRay(
              metrics.centerX,
              metrics.centerY,
              directionX,
              directionY,
              distanceToPageEdge
            )
          };
        };

        function badgesOverlap(firstPlacement, secondPlacement, gap) {
          var deltaX = firstPlacement.anchorPoint.x - secondPlacement.anchorPoint.x;
          var deltaY = firstPlacement.anchorPoint.y - secondPlacement.anchorPoint.y;
          var distance = Math.sqrt(deltaX * deltaX + deltaY * deltaY);

          return (
            distance <
            firstPlacement.badgeOuterRadius + secondPlacement.badgeOuterRadius + gap
          );
        }

        function hasBadgeCollisions(placements, gap) {
          var firstIndex;
          var secondIndex;

          for (firstIndex = 0; firstIndex < placements.length; firstIndex += 1) {
            for (secondIndex = firstIndex + 1; secondIndex < placements.length; secondIndex += 1) {
              if (badgesOverlap(placements[firstIndex], placements[secondIndex], gap)) {
                return true;
              }
            }
          }

          return false;
        }

        function buildLabelPlacements(layout, metrics, labelLayer, labelFontSize) {
          if (!orbitEntries.length) {

          var startAngle = -Math.PI / 2;
          var placements = [];

          labelLayer.textContent = "";

            var node = entry.node;
            var label = entry.label;
            var badgeOrientation = entry.badgeOrientation;
            var radians = startAngle + index * angleStep;
            var distances = window.getDistanceFromHelloWorldToPageEdge(radians);
            var directionX = distances.directionX;
            var directionY = distances.directionY;

            var badgeSolidNode = createSvgElement("path", {
              d: "",
              class: "label-badge-solid",
              visibility: "hidden"
            });
            var badgeDashedNode = createSvgElement("path", {

              class: "label-badge-dashed",

              y1: "0",
              x2: "0",
              y2: "0",

              stroke: "#fff",
              "stroke-width": String(layout.badgeStrokeWidth),
              visibility: "hidden"

              y: "0",

              "dominant-baseline": "middle",
              class: "orbit-label",
              visibility: "hidden"
            });
            var actualRect;
            var badgeFitRect;
            var usableGap;
            var minAnchorDistance;
            var maxAnchorDistance;
            var targetAnchorDistance;
            var anchorDistance;
            var anchorPoint;
            var targetPoint;
            var actualBBox;
            var badgeEdgePoint;
            var labelCenterOffsetX;
            var labelCenterOffsetY;
            var badgeWidth;
            var badgeHeight;
            var textWidth;
            var textHeight;
            var badgePadding;
            var badgeShape;
            var badgeCornerRadius;
            var badgeEdgeDistance;
            var substitutionTargetX;
            var stemStartPoint;
            var stemEndPoint;
            var wordRect;
            var suffixRect;

            labelGroup.appendChild(badgeSolidNode);
            labelGroup.appendChild(badgeDashedNode);

            textHeight = actualRect.maxY - actualRect.minY;

            badgeHeight = textHeight + badgePadding * 2 + layout.badgeStrokeWidth;
            badgeCornerRadius = Math.min(badgeWidth, badgeHeight) * badgeCornerRadiusRatio;
            badgeShape = getBadgeShapeData(
              badgeWidth,
              badgeHeight,
              badgeCornerRadius,
              badgeOrientation,
              entry.badgeStyle

              distances.distanceToTextEdge -
              badgeEdgeDistance * 2;

              metrics,
              layout,
              directionX,
              directionY,
              badgeFitRect

              metrics.centerX,
              metrics.centerY,
              directionX,
              directionY,
              anchorDistance

            targetPoint = getPointOnRay(
              metrics.centerX,
              metrics.centerY,
              directionX,
              directionY,
              targetAnchorDistance
            );
            badgeEdgePoint = {
              x: anchorPoint.x - directionX * badgeEdgeDistance,
              y: anchorPoint.y - directionY * badgeEdgeDistance
            };

            if (isSubstitutionBadge(entry)) {

              suffixRect = getCenterSuffixRect(metrics, layout);
              substitutionTargetX = (suffixRect.minX + suffixRect.maxX) / 2;
              shiftX = substitutionTargetX - distances.textEdgePoint.x;
              anchorPoint.x += shiftX;
              targetPoint.x += shiftX;
              badgeEdgePoint.x += shiftX;

            stemStartPoint = isSubstitutionBadge(entry)

                  x: substitutionTargetX,
                  y: wordRect.minY - layout.stemWordGap

              : {
                  x: distances.textEdgePoint.x + directionX * layout.stemWordGap,
                  y: distances.textEdgePoint.y + directionY * layout.stemWordGap

            stemEndPoint = {
              x: badgeEdgePoint.x - directionX * layout.stemWordGap,
              y: badgeEdgePoint.y - directionY * layout.stemWordGap
            };

            badgeFillNode.setAttribute("d", badgeShape.fillPath);
            badgeFillNode.setAttribute(
              "transform",
              "translate(" + anchorPoint.x + " " + anchorPoint.y + ")"

            badgeSolidNode.setAttribute("d", badgeShape.solidPath);
            badgeSolidNode.setAttribute(
              "transform",
              "translate(" + anchorPoint.x + " " + anchorPoint.y + ")"

            actualBBox = textNode.getBBox();

            placements.push({
              labelGroup: labelGroup,
              badgeFillNode: badgeFillNode,
              badgeSolidNode: badgeSolidNode,
              badgeDashedNode: badgeDashedNode,
              stemNode: stemNode,
              textNode: textNode,

              originPoint: {

              orbitEdgePoint: distances.orbitEdgePoint,
              minAnchorPoint: getPointOnRay(
                metrics.centerX,
                metrics.centerY,
                directionX,

              maxAnchorPoint: getPointOnRay(
                metrics.centerX,
                metrics.centerY,
                directionX,
                directionY,
                maxAnchorDistance === null ? anchorDistance : maxAnchorDistance

              targetPoint: targetPoint,
              anchorPoint: anchorPoint,
              pageEdgePoint: distances.pageEdgePoint,
              actualBBox: actualBBox,
              fitBBox: {
                x: anchorPoint.x + badgeFitRect.minX,
                y: anchorPoint.y + badgeFitRect.minY,
                width: badgeFitRect.maxX - badgeFitRect.minX,
                height: badgeFitRect.maxY - badgeFitRect.minY
              }
            });
          });

          return placements;
        }

        function revealLabelPlacements(placements) {
          placements.forEach(function (placement) {
            placement.badgeFillNode.setAttribute("visibility", "visible");
            placement.badgeSolidNode.setAttribute("visibility", "visible");
            placement.badgeDashedNode.setAttribute("visibility", "visible");
            placement.stemNode.setAttribute("visibility", "visible");
            placement.textNode.setAttribute("visibility", "visible");
          });
        }

        function fitLabelPlacements(layout, metrics, labelLayer) {
          var fontSize = layout.labelFontSizeMax;
          var placements = buildLabelPlacements(layout, metrics, labelLayer, fontSize);

          while (
            hasBadgeCollisions(placements, layout.badgeCollisionGap) &&
            fontSize > layout.labelFontSizeMin
          ) {
            fontSize = Math.max(layout.labelFontSizeMin, fontSize * 0.92);
            placements = buildLabelPlacements(layout, metrics, labelLayer, fontSize);
          }

          return placements;
        }

        function renderClockLabels() {
          var layout = syncSceneToViewport();
          var metrics = getHelloWorldMetrics();
          var labelLayer = document.getElementById("label-layer");
          var debugLayer = document.getElementById("debug-layer");
          var placements;

          lastLayout = layout;
          debugLayer.textContent = "";
          renderWordBoundingBox(metrics, layout);

          placements = fitLabelPlacements(layout, metrics, labelLayer);
          revealLabelPlacements(placements);

          if (debugEnabled) {
            renderStaticDebug(metrics, layout);
            placements.forEach(function (placement, index) {
              renderRayDebug(
                debugLayer,
                placement,
                debugColors[index % debugColors.length]
              );
            });
          }
        }

        function scheduleRender() {
          if (resizeFrame !== null) {
            cancelAnimationFrame(resizeFrame);
          }

          resizeFrame = requestAnimationFrame(function () {
            resizeFrame = null;
            renderClockLabels();
          });
        }

        window.debug = function (enabled) {
          debugEnabled = typeof enabled === "boolean" ? enabled : !debugEnabled;
          renderClockLabels();

          return debugEnabled;
        };

        document.getElementById("gloss-sheet-handle").addEventListener("pointerdown", handleGlossSheetPointerDown);

        document.getElementById("gloss-sheet-handle").addEventListener("pointermove", handleGlossSheetPointerMove);

        document.getElementById("gloss-sheet-handle").addEventListener("pointerup", handleGlossSheetPointerEnd);

        document.getElementById("gloss-sheet-handle").addEventListener("pointercancel", handleGlossSheetPointerCancel);

        document.getElementById("gloss-sheet-handle").addEventListener("click", function (event) {
          if (ignoreNextGlossSheetClick) {
            event.preventDefault();
            ignoreNextGlossSheetClick = false;
            return;
          }

          settleGlossSheet(!glossSheetExpanded);
        });

        Array.prototype.forEach.call(
          document.querySelectorAll("[data-sheet-mode]"),
          function (button) {
            button.addEventListener("click", function () {
              setActiveSheetMode(button.getAttribute("data-sheet-mode"));
            });
          }
        );

        document.getElementById("back-button").addEventListener("click", function () {
          var parentVerbNode = getParentVerbNode(focusedVerbNode);

          if (parentVerbNode) {
            setFocusedVerbNode(parentVerbNode);
          }
        });

        try {
          var loadedData = await Promise.all([
            loadVerbData(),
            loadLexicalData(),
            loadPrefixGuideData()
          ]);

          rootVerbNode = loadedData[0];
          indexLexicalData(loadedData[1]);
          prefixGuideIndex = loadedData[2];
          linkVerbTree(rootVerbNode, null);
          focusedVerbNode = rootVerbNode;
          orbitEntries = getOrbitEntries(rootVerbNode);
        } catch (error) {
          console.error(error);
        }

        updateBackButton();
        renderDetailSheet();
        updateGlossSheetState();
        renderClockLabels();
        window.addEventListener("resize", scheduleRender);
      });
    </script>
  </head>
  <body>
    <div class="controls">
      <button id="back-button" class="nav-button" type="button" aria-label="Go to parent word">
        &#8592;
      </button>
    </div>
    <aside id="gloss-sheet" class="gloss-sheet is-peeking" aria-live="polite" aria-label="Glosses">
      <button
        id="gloss-sheet-handle"
        class="gloss-sheet-handle"
        type="button"
        aria-controls="gloss-sheet-body"
        aria-expanded="false"
        aria-label="Show glosses"
      ></button>
      <div id="gloss-sheet-body"></div>
    </aside>
    <nav class="bottom-tray" aria-label="Detail modes">
      <div class="bottom-tray-inner">
        <button
          class="tray-icon is-active"
          type="button"
          data-sheet-mode="glosses"
          aria-label="Definition and glosses"
          aria-pressed="true"
        >📖</button>
        <button
          class="tray-icon"
          type="button"
          data-sheet-mode="prefix"
          aria-label="Word construction"
          aria-pressed="false"
        >🔨</button>
        <button
          class="tray-icon"
          type="button"
          aria-label="Examples"
          data-sheet-mode="examples"
          aria-pressed="false"
        >🗨️</button>
      </div>
    </nav>
    <svg
      id="scene"
      xmlns="http://www.w3.org/2000/svg"
      viewBox="0 0 100 100"
      role="img"
      aria-label="hello world"
    >
      <g id="debug-layer"></g>
      <g id="hello-world">
        <g id="hello-main-word">
          <text id="hello-prefix" x="50" y="50" text-anchor="start" dominant-baseline="middle"></text>
          <text id="hello-stem" x="50" y="50" text-anchor="start" dominant-baseline="middle">
            pierdol
          </text>
          <text id="hello-suffix" x="50" y="50" text-anchor="start" dominant-baseline="middle">
            ić
          </text>
        </g>
        <text id="hello-reflexive" x="50" y="50" text-anchor="start" dominant-baseline="middle"></text>
      </g>
      <g id="word-bbox-layer"></g>
      <g id="label-layer"></g>
    </svg>
  </body>
</html>
