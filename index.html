<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Pierdolę to...</title>
    <link rel="stylesheet" href="styles.css">
    <script src="main.js" defer></script>
  </head>
  <body>
    <div class="page-shell">
      <main class="mobile-explorer">
        <section class="navigator-surface" aria-label="Verb family navigator">
          <div class="tree-toggle" aria-label="Current variation selector">
            <div id="branch-title" class="branch-title">Loading...</div>
            <button
              id="tree-toggle"
              class="tree-toggle-button"
              type="button"
              aria-expanded="false"
              aria-controls="tree-overlay"
              aria-label="Open variation tree"
            >
              <span class="tree-toggle-icon" aria-hidden="true"></span>
            </button>
          </div>
          <div id="prefix-popover" class="prefix-popover" hidden></div>
          <div class="selector-divider" aria-hidden="true"></div>

          <div id="tree-overlay-backdrop" class="tree-overlay-backdrop" hidden></div>

          <section id="tree-overlay" class="tree-overlay" aria-labelledby="tree-overlay-title" hidden>
            <div class="tree-overlay-head">
              <div>
                <p class="tree-overlay-kicker">Variation tree</p>
                <h2 id="tree-overlay-title">Select a form</h2>
              </div>
              <button id="tree-close" class="tree-close" type="button" aria-label="Close variation tree">
                <span aria-hidden="true">×</span>
              </button>
            </div>
            <p id="tree-path" class="tree-path"></p>
            <div id="branch-list" class="tree-menu"></div>
          </section>
        </section>

        <section class="selection-void" aria-label="Selected variation details">
          <div class="details-header">
            <p id="details-subtitle" class="details-subtitle">Fetching lexical detail.</p>
          </div>
          <div id="details-panel" class="details-body"></div>
        </section>
      </main>
    </div>
  </body>
</html>
